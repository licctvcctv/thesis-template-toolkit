<path d="M 430 640 L 140 640" fill="none" stroke="#555" stroke-width="2.2" stroke-linecap="square" stroke-linejoin="miter" stroke-dasharray="8 6" marker-end="url(#dashArrow)"/>
<text x="284" y="624" font-family="SimSun, Songti SC, serif" font-size="18" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">9: 存储令牌到本地</text>
