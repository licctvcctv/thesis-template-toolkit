<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1500" viewBox="0 0 1100 1500" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202020" />
    </marker>
    <marker id="dashArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555" />
    </marker>
  </defs>
  <rect x="0" y="0" width="1100" height="1500" fill="#ffffff"/>
  <rect x="380" y="40" width="240" height="60" rx="16" ry="16" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="70" font-family="SimSun, Songti SC, serif" font-size="32" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">开始</text>
<path d="M 500 100 L 500 140" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="320" y="140" width="360" height="60" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="170" font-family="SimSun, Songti SC, serif" font-size="28" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">用户登录系统</text>
<path d="M 500 200 L 500 250" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="320" y="250" width="360" height="60" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="280" font-family="SimSun, Songti SC, serif" font-size="28" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">浏览菜品列表</text>
<path d="M 500 310 L 500 360" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="320" y="360" width="360" height="60" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="390" font-family="SimSun, Songti SC, serif" font-size="27" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">选择菜品，填写数量</text>
<path d="M 500 420 L 500 480" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<path d="M 500 480 L 680 540 L 500 610 L 330 540 Z" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="540" font-family="SimSun, Songti SC, serif" font-size="27" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">库存是否充足</text>
<path d="M 680 540 L 840 540" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<text x="755" y="508" font-family="SimSun, Songti SC, serif" font-size="26" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">否</text>
<rect x="840" y="510" width="250" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="965" y="545" font-family="SimSun, Songti SC, serif" font-size="25" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">提示库存不足</text>
<path d="M 500 600 L 500 660" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<text x="526" y="630" font-family="SimSun, Songti SC, serif" font-size="26" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">是</text>
<path d="M 500 660 L 680 720 L 500 790 L 330 720 Z" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="720" font-family="SimSun, Songti SC, serif" font-size="27" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">余额是否充足</text>
<path d="M 680 720 L 840 720" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<text x="755" y="688" font-family="SimSun, Songti SC, serif" font-size="26" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">否</text>
<rect x="840" y="690" width="250" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="965" y="725" font-family="SimSun, Songti SC, serif" font-size="25" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">提示余额不足</text>
<path d="M 500 780 L 500 840" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<text x="526" y="810" font-family="SimSun, Songti SC, serif" font-size="26" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">是</text>
<rect x="320" y="840" width="360" height="60" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="870" font-family="SimSun, Songti SC, serif" font-size="25" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">创建订单，扣库存/余额</text>
<path d="M 500 900 L 500 950" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="320" y="950" width="360" height="60" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="980" font-family="SimSun, Songti SC, serif" font-size="25" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">累加积分，评定会员等级</text>
<path d="M 500 1010 L 500 1060" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="320" y="1060" width="360" height="60" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="1090" font-family="SimSun, Songti SC, serif" font-size="27" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">管理员/员工发货</text>
<path d="M 500 1120 L 500 1170" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="320" y="1170" width="360" height="60" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="1200" font-family="SimSun, Songti SC, serif" font-size="28" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">用户确认收货</text>
<path d="M 500 1230 L 500 1280" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="320" y="1280" width="360" height="60" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="1310" font-family="SimSun, Songti SC, serif" font-size="28" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">用户提交评价</text>
<path d="M 500 1340 L 500 1390" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="380" y="1390" width="240" height="60" rx="16" ry="16" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="1420" font-family="SimSun, Songti SC, serif" font-size="32" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">结束</text>
</svg>