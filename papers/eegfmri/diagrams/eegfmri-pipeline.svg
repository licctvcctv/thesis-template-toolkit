<rect x="950" y="300" width="300" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="1100" y="335" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">运动校正
