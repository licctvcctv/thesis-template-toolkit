<path d="M 1100 370 L 1100 400" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="950" y="400" width="300" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="1100" y="435" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">平滑滤波
