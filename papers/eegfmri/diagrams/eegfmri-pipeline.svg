<text x="800" y="1287" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">/F1)</text>
<path d="M 800 1210 L 800 1240" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="680" y="1340" width="240" height="70" rx="16" ry="16" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="800" y="1375" font-family="SimSun, Songti SC, serif" font-size="26" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">输出结果</text>
<path d="M 800 1310 L 800 1340" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
