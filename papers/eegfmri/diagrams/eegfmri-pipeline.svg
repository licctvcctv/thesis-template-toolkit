<path d="M 500 670 L 500 700" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="350" y="700" width="300" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="723" font-family="SimSun, Songti SC, serif" font-size="19" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">运动区9通道选择
(</text>
<text x="500" y="747" font-family="SimSun, Songti SC, serif" font-size="19" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">FC1/FC2/C1-C4/CP1/CP2/Cz)</text>
<text x="1100" y="170" font-family="SimHei, PingFang SC, sans-serif" font-size="22" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">fMRI通道</text>
<rect x="950" y="200" width="300" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
