<rect x="350" y="810" width="300" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="500" y="833" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">EEG特征提取
(时域/频域/NF得</text>
<text x="500" y="857" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">分)</text>
<rect x="950" y="810" width="300" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="1100" y="845" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">BOLD特征提取
(ROI衍生指标)</text>
<path d="M 500 770 L 500 810" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<path d="M 1100 670 L 1100 810" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<path d="M 800 870 L 990 940 L 800 1010 L 610 940 Z" fill="#fff" stroke="#202020" stroke-width="3"/>
