多模态融合?</text>
<path d="M 500 880 L 500 870 L 610 940" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<path d="M 1100 880 L 1100 870 L 990 940" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<text x="820" y="1025" font-family="SimSun, Songti SC, serif" font-size="22" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">是</text>
<rect x="640" y="1040" width="320" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="800" y="1062" font-family="SimSun, Songti SC, serif" font-size="22" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">特征级融合
(15维融合特征集</text>
<text x="800" y="1088" font-family="SimSun, Songti SC, serif" font-size="22" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">)</text>
<path d="M 800 1010 L 800 1040" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<text x="1010" y="920" font-family="SimSun, Songti SC, serif" font-size="22" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">否</text>
<rect x="1250" y="910" width="260" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="1380" y="933" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">单模态特征集
(EEG或</text>
<text x="1380" y="957" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">BOLD)</text>
<path d="M 990 940 L 1250 940" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<path d="M 1380 980 L 1380 1180 L 960 1180" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="640" y="1140" width="320" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="800" y="1162" font-family="SimSun, Songti SC, serif" font-size="22" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">机器学习分类
(SVM / kNN /</text>
<text x="800" y="1188" font-family="SimSun, Songti SC, serif" font-size="22" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">RF)</text>
<path d="M 800 1110 L 800 1140" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" marker-end="url(#arrow)"/>
<rect x="100" y="910" width="240" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="220" y="933" font-family="SimSun, Songti SC, serif" font-size="19" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">脑功能网络构建
(图论指</text>
<text x="220" y="957" font-family="SimSun, Songti SC, serif" font-size="19" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">标分析)</text>
<path d="M 610 940 L 340 940" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" stroke-dasharray="8 6"/>
<path d="M 240 940 L 340 940" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" stroke-dasharray="8 6"/>
<path d="M 350 850 L 340 850 L 340 940 L 340 940" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>
<path d="M 340 940 L 340 940" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>
<path d="M 350 850 L 220 850 L 220 910" fill="none" stroke="#202020" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" stroke-dasharray="8 6" marker-end="url(#dashArrow)"/>
<rect x="640" y="1240" width="320" height="70" rx="0" ry="0" fill="#fff" stroke="#202020" stroke-width="3"/>
<text x="800" y="1263" font-family="SimSun, Songti SC, serif" font-size="20" font-weight="400" fill="#202020" text-anchor="middle" dominant-baseline="middle">性能评估
